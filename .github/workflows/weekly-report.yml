name: Weekly Git Report

on:
  schedule:
    # 매주 월요일 오전 9시 (한국시간) - UTC 기준 일요일 자정
    - cron: '0 0 * * SUN'
  workflow_dispatch: # 수동 실행 가능

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 전체 히스토리 가져오기
    
    - name: Generate Weekly Report for pub-client
      id: report
      run: |
        # GitHub API로 pub-client 저장소 커밋 정보 가져오기
        REPO="devsisters/pub-client"
        SINCE=$(date -d '7 days ago' --iso-8601)
        
        echo "# 📊 pub-client 주간 Git 커밋 리포트" > report.md
        echo "**저장소:** https://github.com/$REPO" >> report.md
        echo "**생성일:** $(date '+%Y-%m-%d %H:%M:%S')" >> report.md
        echo "**기간:** 지난 7일" >> report.md
        echo "" >> report.md
        
        # GitHub API로 커밋 정보 가져오기
        curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/$REPO/commits?since=$SINCE&per_page=100" > commits.json
        
        # 커밋 수 계산
        COMMIT_COUNT=$(jq length commits.json)
        echo "## 📊 커밋 통계" >> report.md
        echo "- 총 커밋 수: $COMMIT_COUNT" >> report.md
        
        # 개발자별 커밋 수 계산
        echo "- 활동한 개발자 수: $(jq -r '.[].author.login' commits.json | sort | uniq | wc -l)" >> report.md
        echo "" >> report.md
        
        # 개발자별 활동
        echo "## 👥 개발자별 활동" >> report.md
        jq -r '.[].author.login' commits.json | sort | uniq -c | sort -nr | while read count author; do
          echo "- $author: $count 커밋" >> report.md
        done
        echo "" >> report.md
        
        # 상세 커밋 로그
        echo "## 📝 상세 커밋 내역" >> report.md
        jq -r '.[] | "- **\(.sha[0:7])** (\(.author.login), \(.commit.author.date)): \(.commit.message | split("\n")[0])"' commits.json >> report.md
    
    - name: Send Email Report
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "[Git Report] pub-client 주간 커밋 리포트"
        body: file://report.md
        to: ${{ secrets.EMAIL_TO }}
        from: ${{ secrets.EMAIL_FROM }}
        content_type: text/html
        convert_markdown: true